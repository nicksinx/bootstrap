schema_version: 1
profile_version: "2.0.0"
name: default
description: >
  OKF + Forge lifecycle MCP + OKF dispatch scaffold (Project-1 aligned).
  Generates Forge launchers, dispatch scripts, five-service operator docs,
  and curated OKF workflows. No ai-task MCP or worker orchestration.
defaults:
  default_branch: main
  github:
    visibility: private
    create_labels: true
    create_templates: true
  okf:
    enabled: true
    bundle_path: .okf
    profile: software-development
    continuous_improvement_path: .okf/improvements
